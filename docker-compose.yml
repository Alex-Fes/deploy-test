services:
  postgres:
    image: postgres:16-alpine
    container_name: deploy-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: deploy_test
      POSTGRES_USER: landing_user
      POSTGRES_PASSWORD: landing_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landing_user -d deploy_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
