name: Deploy → Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Prod VPS
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd "${{ secrets.PROD_DEPLOY_PATH }}"

            echo "▶ Pull latest main branch"
            git fetch origin main
            git reset --hard origin/main

            echo "▶ Install dependencies"
            NODE_ENV=development npm ci --prefer-offline

            echo "▶ Build apps"
            NODE_ENV=development npx turbo build --filter=@repo/web --filter=@repo/api

            echo "▶ Copy Next.js static assets to standalone"
            cp -r apps/web/public apps/web/.next/standalone/apps/web/public
            mkdir -p apps/web/.next/standalone/apps/web/.next
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static

            echo "▶ Restart PM2 prod processes"
            SITE=$(jq -r .siteName .siterc.json)
            pm2 reload ecosystem.config.js --only "${SITE}-prod-next,${SITE}-prod-nest" 2>/dev/null \
              || pm2 start ecosystem.config.js --only "${SITE}-prod-next,${SITE}-prod-nest"
            pm2 save

            echo "✓ Prod deploy complete"
