name: Deploy → Stage

on:
  push:
    branches: [dev]

jobs:
  deploy:
    name: Deploy to Stage VPS
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd "${{ secrets.STAGE_DEPLOY_PATH }}"

            echo "▶ Pull latest dev branch"
            git fetch origin dev
            git reset --hard origin/dev

            echo "▶ Install dependencies"
            NODE_ENV=development npm ci --prefer-offline

            echo "▶ Build apps"
            NODE_ENV=development npx turbo build --filter=@repo/web --filter=@repo/api

            echo "▶ Copy Next.js static assets to standalone"
            cp -r apps/web/public apps/web/.next/standalone/apps/web/public
            mkdir -p apps/web/.next/standalone/apps/web/.next
            cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static

            echo "▶ Run TypeORM migrations"
            set -a && source .env.stage && set +a
            npm run typeorm:migration:run --workspace apps/api

            echo "▶ Restart PM2 stage processes"
            SITE=$(jq -r .siteName .siterc.json)
            pm2 reload ecosystem.config.js --only "${SITE}-stage-next,${SITE}-stage-nest" 2>/dev/null \
              || pm2 start ecosystem.config.js --only "${SITE}-stage-next,${SITE}-stage-nest"
            pm2 save

            echo "✓ Stage deploy complete"
